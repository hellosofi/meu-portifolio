    <script>
        // Fica observando o movimento de scroll na tela
        window.addEventListener('scroll', function() {
            
            // Pega a nossa div do degradê
            const degrade = document.getElementById('efeito-degrade');
            
            // Pega a quantidade de pixels que rolamos para baixo
            const rolagem = window.scrollY;
            
            // Calcula a opacidade (0 até 300px de descida)
            let novaOpacidade = rolagem / 300;
            
            // Trava o limite em 1 (totalmente visível) para não passar do ponto
            if (novaOpacidade > 1) {
                novaOpacidade = 1;
            }
            
            // Aplica a opacidade na tela
            degrade.style.opacity = novaOpacidade;
        });
    </script>
